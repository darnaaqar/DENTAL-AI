name: Build & Release Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      - name: Create Flutter App Shell
        run: |
          flutter create --org com.example.dentalclinic --project-name dental_clinic_app flutter_project

      - name: Copy Custom Flutter Code
        run: |
          cp pubspec.yaml flutter_project/pubspec.yaml
          cp flutter_main.dart flutter_project/lib/main.dart

      - name: Get Dependencies
        working-directory: flutter_project
        run: flutter pub get

      - name: Build Optimized Release APKs
        working-directory: flutter_project
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dental-clinic-release-apks
          path: flutter_project/build/app/outputs/flutter-apk/*.apk
