name: Build & Release Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      - name: Create Flutter App Shell
        run: |
          flutter create --org com.example.dentalclinic --project-name dr_mudtafa_alrifaie flutter_project

      - name: Copy Custom Flutter Code
        run: |
          cp pubspec.yaml flutter_project/pubspec.yaml
          cp flutter_main.dart flutter_project/lib/main.dart
          mkdir -p flutter_project/src/assets/images
          cp -r src/assets/images/* flutter_project/src/assets/images/ || true

      - name: Configure Android Internet Permissions
        run: |
          python3 -c "
          import os
          path = 'flutter_project/android/app/src/main/AndroidManifest.xml'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  text = f.read()
              if 'android.permission.INTERNET' not in text:
                  text = text.replace('<application', '    <uses-permission android:name=\"android.permission.INTERNET\" />\n    <application')
                  with open(path, 'w') as f:
                      f.write(text)
                  print('Internet permission successfully injected into AndroidManifest.xml')
              else:
                  print('Internet permission already present')
          else:
              print('ERROR: AndroidManifest.xml not found at', path)
          "

      - name: Get Dependencies
        working-directory: flutter_project
        run: flutter pub get

      - name: Generate App Launcher Icons
        working-directory: flutter_project
        run: dart run flutter_launcher_icons

      - name: Build Optimized Release APKs
        working-directory: flutter_project
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dr-mudtafa-alrifaie-release-apks
          path: flutter_project/build/app/outputs/flutter-apk/*.apk
